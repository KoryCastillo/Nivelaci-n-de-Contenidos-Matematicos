<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Proyecto de Nivelación Matemática - UNED Costa Rica</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		:root {
			--uned-blue: #003366;
			--uned-light-blue: #0055a4;
			--uned-cyan: #0077b6;
			--uned-light-cyan: #00b4d8;
			--uned-accent: #90e0ef;
			--light-bg: #f0f8ff;
			--white: #ffffff;
			--text-dark: #333333;
			--text-light: #f8f9fa;
			--shadow: 0 5px 15px rgba(0, 51, 102, 0.1);
			--transition: all 0.3s ease;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		body {
			background: linear-gradient(135deg, var(--light-bg), #e6f7ff);
			color: var(--text-dark);
			min-height: 100vh;
			padding: 20px;
			position: relative;
			overflow-x: hidden;
		}

		header {
			text-align: center;
			padding: 30px 0;
			margin-bottom: 30px;
			background: linear-gradient(to right, var(--uned-blue), var(--uned-cyan));
			border-radius: 15px;
			box-shadow: var(--shadow);
			color: var(--white);
			position: relative;
			overflow: hidden;
		}

		.logo-container {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 20px;
			margin-bottom: 20px;
		}

		.logo {
			height: 10px;
			background: var(--white);
			padding: 10px;
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.logo span {
			font-weight: bold;
			font-size: 1.8rem;
			color: var(--uned-blue);
		}

		h1 {
			font-size: 2.5rem;
			margin-bottom: 15px;
			text-shadow: 0 2px 4px rgba(0,0,0,0.3);
		}

		.subtitle {
			font-size: 1.2rem;
			max-width: 800px;
			margin: 0 auto 20px;
			opacity: 0.9;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
		}

		.modules-container {
			display: grid;
			grid-template-columns: repeat(4, 250px);;
			gap: 15px;
			margin-bottom: 50px;
		}

		.module-card {
			background: var(--white);
			border-radius: 15px;
			overflow: hidden;
			box-shadow: var(--shadow);
			transition: var(--transition);
			cursor: pointer;
			position: relative;
			height: 350px;
			display: flex;
			flex-direction: column;
		}

		.module-card:hover {
			transform: translateY(-10px);
			box-shadow: 0 15px 30px rgba(0, 51, 102, 0.2);
		}

		.module-image {
			height: 350px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: var(--transition);
			position: relative;
			overflow: hidden;
			background-size: cover;
			background-position: center;
		}

		.module-card:hover .module-image {
			transform: scale(1.05);
		}

		.module-content {
			padding: 20px;
			position: relative;
			z-index: 2;
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		.module-title {
			font-size: 1.2rem;
			font-weight: 600;
			color: var(--uned-blue);
			margin-bottom: 8px;
		}

		.module-desc {
			font-size: 0.9rem;
			color: var(--text-dark);
			opacity: 0.8;
			line-height: 1.4;
		}

		.module-number {
			position: absolute;
			top: 10px;
			left: 15px;
			background: var(--white);
			color: var(--uned-blue);
			width: 36px;
			height: 36px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
			font-size: 1.1rem;
			z-index: 3;
		}

		.floating-btn {
			position: fixed;
			right: 30px;
			bottom: 70px;
			width: 60px;
			height: 60px;
			background: var(--uned-light-blue);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--white);
			font-size: 1.5rem;
			box-shadow: 0 5px 15px rgba(0, 51, 102, 0.4);
			cursor: pointer;
			transition: var(--transition);
			z-index: 1000;
		}

		.floating-btn:hover {
			transform: scale(1.1) rotate(15deg);
			background: var(--uned-cyan);
		}

		.modal-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.7);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 2000;
			opacity: 0;
			visibility: hidden;
			transition: var(--transition);
		}

		.modal-overlay.active {
			opacity: 1;
			visibility: visible;
		}

		.modal-content {
			background: var(--white);
			width: 90%;
			max-width: 600px;
			border-radius: 20px;
			overflow: hidden;
			transform: translateY(50px);
			transition: var(--transition);
			position: relative;
		}

		.modal-overlay.active .modal-content {
			transform: translateY(0);
		}

		.modal-header {
			background: linear-gradient(to right, var(--uned-blue), var(--uned-cyan));
			padding: 25px;
			color: var(--white);
			position: relative;
		}

		.close-modal {
			position: absolute;
			top: 20px;
			right: 20px;
			background: rgba(255, 255, 255, 0.2);
			width: 40px;
			height: 40px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: var(--transition);
		}

		.close-modal:hover {
			background: rgba(255, 255, 255, 0.3);
			transform: rotate(90deg);
		}

		.modal-body {
			padding: 30px;
			max-height: 60vh;
			overflow-y: auto;
		}

		.modal-title {
			font-size: 1.8rem;
			margin-bottom: 15px;
		}

		.modal-image {
			width: 100%;
			height: 200px;
			background-size: cover;
			background-position: center;
			margin: 20px 0;
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.modal-text {
			line-height: 1.7;
			margin-bottom: 25px;
			color: var(--text-dark);
		}

		.btn {
			display: inline-block;
			padding: 14px 30px;
			background: var(--uned-light-blue);
			color: var(--white);
			border-radius: 50px;
			text-decoration: none;
			font-weight: 600;
			transition: var(--transition);
			border: none;
			cursor: pointer;
			font-size: 1rem;
			box-shadow: 0 4px 10px rgba(0, 85, 164, 0.3);
		}

		.btn:hover {
			background: var(--uned-cyan);
			transform: translateY(-3px);
			box-shadow: 0 6px 15px rgba(0, 85, 164, 0.4);
		}

		.btn i {
			margin-left: 8px;
		}

		.footer {
			text-align: center;
			padding: 30px 0;
			color: var(--uned-blue);
			font-size: 0.9rem;
			border-top: 1px solid rgba(0, 51, 102, 0.1);
			margin-top: 30px;
		}

		.wave {
			position: absolute;
			bottom: 0;
			left: 0;
			width: 100%;
			overflow: hidden;
			line-height: 0;
			transform: rotate(180deg);
			z-index: -1;
		}

		.wave svg {
			position: relative;
			display: block;
			width: calc(100% + 1.3px);
			height: 100px;
		}

		.wave .shape-fill {
			fill: var(--uned-light-cyan);
			opacity: 0.2;
		}

		.math-bg-elements {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: -1;
			overflow: hidden;
		}

		.math-element {
			position: absolute;
			opacity: 0.1;
			font-size: 3rem;
			color: var(--uned-blue);
		}

		@media (max-width: 768px) {
			.modules-container {
				grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			}
			
			h1 {
				font-size: 2rem;
			}
			
			.subtitle {
				font-size: 1rem;
				padding: 0 15px;
			}
			
			.modal-content {
				width: 95%;
			}
		}

		@media (max-width: 480px) {
			.modules-container {
				grid-template-columns: 1fr;
			}
			
			.module-card {
				height: auto;
			}
			
			header {
				padding: 20px 0;
			}
			
			.logo-container {
				flex-direction: column;
				gap: 10px;
			}
		}
	</style>
</head>
<body>
	<div class="math-bg-elements">
		<div class="math-element" style="top: 10%; left: 5%; transform: rotate(15deg);">∫</div>
		<div class="math-element" style="top: 20%; right: 7%; transform: rotate(-10deg);">π</div>
		<div class="math-element" style="top: 40%; left: 3%; transform: rotate(25deg);">α</div>
		<div class="math-element" style="top: 60%; right: 10%; transform: rotate(-15deg);">∑</div>
		<div class="math-element" style="top: 80%; left: 8%; transform: rotate(30deg);">θ</div>
		<div class="math-element" style="top: 30%; left: 15%; transform: rotate(45deg);">∞</div>
		<div class="math-element" style="top: 70%; right: 15%; transform: rotate(-25deg);">β</div>
	</div>

	<div class="wave">
		<svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
			<path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" class="shape-fill"></path>
			<path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" class="shape-fill"></path>
			<path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" class="shape-fill"></path>
		</svg>
	</div>


	<div class="container">
		<div class="modules-container" id="modulesGrid">
			<!-- Módulos generados dinámicamente con JavaScript -->
		</div>
	</div>

	<div class="floating-btn" id="floatingBtn">
		<i class="fas fa-info-circle"></i>
	</div>

	<div class="modal-overlay" id="modalOverlay">
		<div class="modal-content">
			<div class="modal-header">
				<h2 class="modal-title" id="modalTitle">Título del Módulo</h2>
				<div class="close-modal" id="closeModal">
					<i class="fas fa-times"></i>
				</div>
			</div>
			<div class="modal-body">
				<div class="modal-image" id="modalImage">
					<!-- Imagen se establecerá por JS -->
				</div>
				<p class="modal-text" id="modalText">Descripción detallada del módulo...</p>
				<a href="#" class="btn" id="moduleLink" target="_blank">Ver recursos del módulo <i class="fas fa-external-link-alt"></i></a>
			</div>
		</div>
	</div>



	<script>
		// Paleta de colores variados (tonalidades de azul y complementarios)
		const colorPalette = [
			'#003366', // Azul oscuro
			'#0055a4', // Azul medio
			'#0077b6', // Azul turquesa
			'#0096c7', // Azul claro
			'#00b4d8', // Turquesa
			'#48cae4', // Turquesa claro
			'#90e0ef', // Celeste
			'#ade8f4', // Celeste claro
			'#007f5f', // Verde azulado oscuro
			'#2b9348', // Verde
			'#55a630', // Verde claro
			'#80b918'  // Verde lima
		];

		// Imágenes temáticas para cada módulo (puedes reemplazarlas con tus propias imágenes)
		const moduleImages = [
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/modulo1.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo2.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/modulo3.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/modulo4.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/modulo5.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo6.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo7.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo8.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/modulo9.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo10.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo11.png',
			'https://matesvirtuales.com/uned/images/banners/Nivelacion%20de%20Contenidos/imgmodulos/Modulo11.png'
		];

		// Datos de los módulos
		const modules = [
			{
				id: 1,
				title: "Conjuntos Numéricos",
				description: "Fundamentos de expresiones algebraicas, ecuaciones y polinomios.",
				longDesc: "Este módulo cubre los conceptos fundamentales del álgebra, incluyendo operaciones con expresiones algebraicas, resolución de ecuaciones lineales y cuadráticas, factorización de polinomios, y simplificación de expresiones racionales. Los estudiantes aprenderán a manipular símbolos algebraicos y resolver problemas básicos.",
				icon: "fa-square-root-variable"
			},
			{
				id: 2,
				title: "Teoría de conjuntos y teoría de números",
				description: "Estudio de figuras geométricas, ángulos y propiedades.",
				longDesc: "Exploración de las propiedades y relaciones de figuras geométricas en el plano. Se incluyen triángulos, cuadriláteros, círculos, polígonos, y sus características. Los estudiantes aprenderán a calcular áreas, perímetros, y aplicar teoremas fundamentales como el de Pitágoras.",
				icon: "fa-shapes"
			},
			{
				id: 3,
				title: "Expresiones Algebraicas",
				description: "Introducción a funciones matemáticas y su representación gráfica.",
				longDesc: "Este módulo introduce el concepto de función matemática, sus propiedades y diferentes representaciones (algebraica, gráfica, tabular). Se estudian funciones lineales, cuadráticas, exponenciales y logarítmicas. Los estudiantes aprenderán a graficar funciones y analizar su comportamiento.",
				icon: "fa-chart-line"
			},
			{
				id: 4,
				title: "Ecuaciones e inecuaciones",
				description: "Razones trigonométricas, identidades y aplicaciones.",
				longDesc: "Estudio de las funciones trigonométricas (seno, coseno, tangente) y sus aplicaciones. Se cubren triángulos rectángulos, círculo unitario, identidades trigonométricas, ecuaciones trigonométricas y gráficas de funciones trigonométricas. Incluye aplicaciones prácticas en problemas de medición.",
				icon: "fa-triangle"
			},
			{
				id: 5,
				title: "Funciones (Conceptos básicos de funciones)",
				description: "Límites, derivadas y aplicaciones.",
				longDesc: "Introducción al cálculo diferencial, comenzando con el concepto de límite y continuidad. Se cubren las reglas de derivación, derivadas de funciones elementales, y aplicaciones de la derivada (tasas de cambio, máximos y mínimos, optimización).",
				icon: "fa-infinity"
			},
			{
				id: 6,
				title: "Función Afín y función cuadrática",
				description: "Integrales, técnicas de integración y aplicaciones.",
				longDesc: "Este módulo aborda el concepto de integral indefinida y definida. Se enseñan técnicas de integración (sustitución, integración por partes, fracciones parciales) y aplicaciones de la integral (cálculo de áreas, volúmenes, trabajo). También incluye una introducción a ecuaciones diferenciales básicas.",
				icon: "fa-calculator"
			},
			{
				id: 7,
				title: "Función Logarítmica y función exponencial",
				description: "Recolección, organización y presentación de datos.",
				longDesc: "Fundamentos de estadística descriptiva, incluyendo métodos para recolectar, organizar, resumir y presentar datos. Se cubren medidas de tendencia central, dispersión, posición, y técnicas de representación gráfica (histogramas, diagramas de caja, gráficos de dispersión).",
				icon: "fa-chart-bar"
			},
			{
				id: 8,
				title: "Funciones trigonométricas",
				description: "Conceptos básicos, distribuciones y aplicaciones.",
				longDesc: "Introducción a la teoría de probabilidad. Se cubren espacios muestrales, eventos, probabilidad condicional, independencia, variables aleatorias discretas y continuas, distribuciones de probabilidad (binomial, Poisson, normal), y teoremas fundamentales como el de Bayes.",
				icon: "fa-dice"
			},
			{
				id: 9,
				title: "Geometría I",
				description: "Vectores, matrices y sistemas de ecuaciones.",
				longDesc: "Estudio de vectores, matrices, determinantes, y sistemas de ecuaciones lineales. Se incluyen operaciones con matrices, espacios vectoriales, transformaciones lineales, y aplicaciones como solución de sistemas de ecuaciones mediante diferentes métodos (Gauss, Gauss-Jordan).",
				icon: "fa-border-all"
			},
			{
				id: 10,
				title: "Geometría II",
				description: "Interés, anualidades y aplicaciones comerciales.",
				longDesc: "Aplicaciones de las matemáticas en contextos financieros. Se cubren conceptos de interés simple y compuesto, descuentos, anualidades, amortizaciones, y evaluación de inversiones. Los estudiantes aprenderán a resolver problemas prácticos relacionados con finanzas personales y empresariales.",
				icon: "fa-coins"
			},
			{
				id: 11,
				title: "Probabilidad y Estadística",
				description: "Proposiciones, conectivos lógicos y demostraciones.",
				longDesc: "Fundamentos de la lógica proposicional y predicados. Se estudian tablas de verdad, equivalencias lógicas, métodos de demostración (directa, por contradicción, inducción matemática), y cuantificadores. Este módulo desarrolla habilidades de razonamiento formal.",
				icon: "fa-brain"
			},
			{
				id: 12,
				title: "Probabilidad y Estadística",
				description: "Conjuntos, relaciones y estructuras discretas.",
				longDesc: "Introducción a las matemáticas discretas, con énfasis en estructuras y objetos discretos. Se cubren conjuntos, relaciones, funciones, combinatoria (permutaciones, combinaciones), teoría de grafos básica, y árboles. Aplicaciones en ciencias de la computación.",
				icon: "fa-diagram-project"
			}
		];

		// Generar los módulos en el grid
		const modulesGrid = document.getElementById('modulesGrid');
		
		modules.forEach((module, index) => {
			const moduleCard = document.createElement('div');
			moduleCard.className = 'module-card';
			
			// Asignar color de la paleta (cíclico)
			const color = colorPalette[index % colorPalette.length];
			
		
			moduleCard.innerHTML = `
				<div class="module-number">${module.id}</div>
				<div class="module-image" style="background-color: ${color}; background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('${moduleImages[index]}')">
					
				</div>
				<div class="module-content">
					<h3 class="module-title">${module.title}</h3>
					<p class="module-desc">${module.description}</p>
				</div>
			`;
			
			moduleCard.addEventListener('click', () => {
				openModal(module, index);
			});
			
			modulesGrid.appendChild(moduleCard);
		});

		// Funcionalidad del modal
		const modalOverlay = document.getElementById('modalOverlay');
		const closeModal = document.getElementById('closeModal');
		const modalTitle = document.getElementById('modalTitle');
		const modalText = document.getElementById('modalText');
		const moduleLink = document.getElementById('moduleLink');
		const modalImage = document.getElementById('modalImage');
		
		function openModal(module, index) {
			modalTitle.textContent = `Módulo ${module.id}: ${module.title}`;
			modalText.textContent = module.longDesc;
			moduleLink.href = `modulo${module.id}.html`;
			
			// Establecer imagen en el modal
			modalImage.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('${moduleImages[index]}')`;
			modalImage.innerHTML = ''; // Quitamos el icono si lo hubiera
			
			modalOverlay.classList.add('active');
			document.body.style.overflow = 'hidden';
		}
		
		function closeModalFunc() {
			modalOverlay.classList.remove('active');
			document.body.style.overflow = 'auto';
		}
		
		closeModal.addEventListener('click', closeModalFunc);
		modalOverlay.addEventListener('click', (e) => {
			if (e.target === modalOverlay) {
				closeModalFunc();
			}
		});
		
		// Botón flotante para información general
		const floatingBtn = document.getElementById('floatingBtn');
		floatingBtn.addEventListener('click', () => {
			alert("Este proyecto de nivelación matemática consta de 12 módulos diseñados para fortalecer tus habilidades matemáticas fundamentales. Selecciona cualquier módulo para ver su descripción detallada y acceder a sus recursos.");
		});

		// Animación de elementos matemáticos flotantes
		const mathElements = document.querySelectorAll('.math-element');
		mathElements.forEach(el => {
			// Animación flotante
			const animation = el.animate(
				[
					{ transform: 'translateY(0) rotate(0deg)' },
					{ transform: 'translateY(-20px) rotate(5deg)' },
					{ transform: 'translateY(0) rotate(0deg)' }
				],
				{
					duration: 5000 + Math.random() * 5000,
					iterations: Infinity,
					direction: 'alternate'
				}
			);
		});
	</script>
</body>
</html>
